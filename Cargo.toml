[package]
name = "kronos"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.41.1", features = ["full"] }
diesel = { version = "2.2.5", features = ["sqlite", "returning_clauses_for_sqlite_3_35"] }
diesel_migrations = "2.2.0"
libsqlite3-sys = { version = "0.30.1", features = ["bundled"] }
dotenvy = "0.15.7"
rstest = "0.24.0"
chrono = { version = "0.4.38", features = ["serde"]}
regex = "1.11.1"
egui = "0.30.0"
eframe = "0.30.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8.5"
tokio-macros = "2.4.0"
env_logger = "0.11.6"
log = "0.4.22"
